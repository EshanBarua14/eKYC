version: "3.9"

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ekyc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ekyc_db
      POSTGRES_USER:     ekyc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekyc_user -d ekyc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ekyc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ekyc_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql://ekyc_user:${POSTGRES_PASSWORD}@postgres:5432/ekyc_db
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:        ${SECRET_KEY}
      NID_API_MODE:      ${NID_API_MODE:-DEMO}
      NID_API_KEY:       ${NID_API_KEY:-}
      SMS_API_KEY:       ${SMS_API_KEY:-}
      SMTP_HOST:         ${SMTP_HOST:-}
      SMTP_USER:         ${SMTP_USER:-}
      SMTP_PASSWORD:     ${SMTP_PASSWORD:-}
      DEBUG:             "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/keys:/app/keys:ro
      - ./backend/ekyc_uploads:/app/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (built static) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ekyc_frontend
    restart: unless-stopped
    expose:
      - "80"

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ekyc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  certbot_data:
