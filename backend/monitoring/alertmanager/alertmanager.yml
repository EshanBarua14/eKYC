# M81: Alertmanager configuration — BFIU eKYC Platform
# Wired to Prometheus alert rules in monitoring/alertmanager_rules.yml
global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@xpertfintech.com.bd'
  smtp_auth_username: '${ALERT_SMTP_USER}'
  smtp_auth_password: '${ALERT_SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'ekyc-ops'
  routes:
    - match:
        severity: critical
      receiver: 'ekyc-critical'
      repeat_interval: 1h
    - match:
        alertname: UNSCRFeedStale
      receiver: 'ekyc-compliance'
      repeat_interval: 2h
    - match:
        alertname: EDDSLABreached
      receiver: 'ekyc-compliance'
      repeat_interval: 2h

receivers:
  - name: 'ekyc-ops'
    email_configs:
      - to: 'ops@xpertfintech.com.bd'
        subject: '[eKYC] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Details: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt }}
          {{ end }}

  - name: 'ekyc-critical'
    email_configs:
      - to: 'ops@xpertfintech.com.bd,cto@xpertfintech.com.bd'
        subject: '[eKYC CRITICAL] {{ .GroupLabels.alertname }}'
        body: |
          CRITICAL ALERT — Immediate action required.
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  - name: 'ekyc-compliance'
    email_configs:
      - to: 'compliance@xpertfintech.com.bd'
        subject: '[eKYC COMPLIANCE] {{ .GroupLabels.alertname }}'
        body: |
          BFIU Compliance Alert
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
