name: eKYC CI — Test + Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ekyc_test
          POSTGRES_USER: ekyc_user
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: sqlite:///./ekyc_test.db

      - name: Run all tests
        run: python -m pytest tests/ -v --tb=short --timeout=60
        env:
          DATABASE_URL: sqlite:///./ekyc_test.db
          REDIS_URL: redis://localhost:6379/0

      - name: Check test count
        run: |
          COUNT=$(python -m pytest tests/ --collect-only -q 2>/dev/null | tail -1 | grep -oP '\d+')
          echo "Tests collected: $COUNT"
          if [ "$COUNT" -lt 600 ]; then echo "❌ Test count below 600"; exit 1; fi
          echo "✅ Test count OK: $COUNT"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size
        run: |
          SIZE=$(du -sk dist/assets/*.js | awk '{sum+=$1} END {print sum}')
          echo "JS bundle: ${SIZE}KB"
          if [ "$SIZE" -gt 600 ]; then echo "⚠️  Bundle > 600KB — consider code splitting"; fi

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets in code
        run: |
          if git ls-files | grep -E "^\.env$" | grep -v ".env.example"; then
            echo "❌ .env file committed"; exit 1
          fi
          echo "✅ No secrets detected"
