version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekyc_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ekyc_network

  db:
    image: postgres:16-alpine
    container_name: ekyc_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ekyc_db}
      POSTGRES_USER: ${POSTGRES_USER:-ekyc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekyc_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ekyc_user} -d ${POSTGRES_DB:-ekyc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ekyc_network

  redis:
    image: redis:7-alpine
    container_name: ekyc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ekyc_network

volumes:
  postgres_data:
  redis_data:

networks:
  ekyc_network:
    driver: bridge
